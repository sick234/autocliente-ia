<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#070b12" />
  <title>Página no encontrada — AutoCliente IA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2310b981'/%3E%3Cpath d='M22 11.5a6.38 6.38 0 0 1-.68 2.89 6.5 6.5 0 0 1-5.82 3.61 6.38 6.38 0 0 1-2.9-.69L9 18l1.45-4.35a6.38 6.38 0 0 1-.69-2.9 6.5 6.5 0 0 1 3.6-5.81 6.38 6.38 0 0 1 2.9-.69h.38A6.48 6.48 0 0 1 22 11.12v.38z' fill='%23041610' stroke='none'/%3E%3C/svg%3E" />

  <style>
    :root {
      --bg: #070b12;
      --brand: #10b981;
      --brand-2: #34d399;
      --brand-border: rgba(16, 185, 129, 0.28);
      --text: #f1f5f9;
      --text-soft: #9fb0c8;
      --text-mute: #5c6d84;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --font-display: 'Syne', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, -apple-system, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 100% 80% at 50% -40%, rgba(16, 185, 129, 0.12), transparent 55%),
        linear-gradient(180deg, #070b12 0%, #050810 100%);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      font-weight: 700;
      font-family: var(--font-display);
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
      margin-bottom: 48px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: linear-gradient(145deg, #34d399 0%, #10b981 45%, #059669 100%);
      display: grid;
      place-items: center;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.2) inset, 0 4px 14px rgba(16,185,129,0.45);
    }

    .logo-mark svg { width: 16px; height: 16px; color: #041610; }

    .error-code {
      font-family: var(--font-display);
      font-size: clamp(80px, 15vw, 140px);
      font-weight: 800;
      letter-spacing: -0.06em;
      line-height: 1;
      background: linear-gradient(135deg, #34d399, #10b981 50%, #059669);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      color: var(--text-soft);
      max-width: 400px;
      line-height: 1.65;
      margin-bottom: 36px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font-body);
      border-radius: 12px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease), filter 0.25s;
    }

    .btn-primary {
      background: linear-gradient(145deg, #2ee6a8 0%, #10b981 45%, #059669 100%);
      color: #041610;
      box-shadow: 0 10px 28px rgba(16, 185, 129, 0.38);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 16px 40px rgba(16, 185, 129, 0.48);
    }
  </style>
</head>
<body>

  <a href="index.html" class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
      </svg>
    </div>
    AutoCliente IA
  </a>

  <div class="error-code">404</div>
  <h1>Página no encontrada</h1>
  <p>Esta página no existe o fue movida. Regresa al inicio para seguir explorando.</p>

  <a href="index.html" class="btn btn-primary">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    Volver al inicio
  </a>

</body>
</html>
